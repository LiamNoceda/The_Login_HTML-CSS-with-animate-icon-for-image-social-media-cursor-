<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Соцсеть</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        header { background-color: white; padding: 10px 20px; display: flex; justify-content: space-between; position: sticky; top: 0; border-bottom: 1px solid #ddd; z-index: 1000; }
        .logo { font-weight: bold; color: #1877f2; font-size: 24px; }
        .container { display: flex; padding: 20px; gap: 20px; }
        .sidebar { width: 20%; }
        .main-content { width: 55%; }
        .right-panel { width: 25%; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd; }
        .post-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background-color: #1877f2; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="logo">NetWork</div>
        <input type="text" placeholder="Поиск...">
        <div>Профиль</div>
    </header>

    <div class="container">
        <aside class="sidebar card">
            <h3>Меню</h3>
            <ul>
                <li>Моя страница</li>
                <li>Новости</li>
                <li>Сообщения</li>
                <li>Друзья</li>
            </ul>
        </aside>

        <section class="main-content">
            <div class="card">
                <textarea class="post-input" placeholder="Что нового?"></textarea>
                <button>Опубликовать</button>
            </div>
            <div class="card">
                <h4>Иван Иванов</h4>
                <p>Привет! Это мой первый пост в новой соцсети.</p>
            </div>
        </section>

        <aside class="right-panel card">
            <h3>Друзья онлайн</h3>
            <p>Петр</p>
            <p>Мария</p>
        </aside>
    </div>
</body>
</html>
